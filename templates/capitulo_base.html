<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} | GreatBook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="description" content="GreatBook Library - Lectura offline. Grandes Libros y Grandes promesas.">
</head>
<body>
    <div id="top"></div>
    <header>
        <h1>GreatBook Library</h1>
    </header>

    <nav class="nav-desktop">
    <ul class="desktop-menu">
<li><a href="index.html">Inicio</a></li>
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="noticias.html">Noticias</a></li>
            <li><a href="terminos.html">Términos</a></li>
            <li><a href="descargas.html">Descargar</a></li>
    </ul>
</nav>

<nav class="nav-mobile">
    <div class="circle"></div>
    <div class="menu-mobile-container">
        <ul class="mobile-menu-list">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="catalogo.html">Catálogo</a></li>
            <li><a href="noticias.html">Noticias</a></li>
            <li><a href="terminos.html">Términos</a></li>
            <li><a href="descargas.html">Descargar</a></li>
        </ul>
    </div>
    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <div class="burger-lines">
            <div class="x"></div>
            <div class="y"></div>
            <div class="z"></div>
        </div>
    </button>
</nav>

    <main class="chapter-content">
        <section>
            <h2>{{title}}</h2>
            {{content}}
        </section>

        <nav class="chapter-nav">
            {{prev_link}}
            {{home_link}}
            {{next_link}}
        </nav>
        <a class="back-to-top" href="#top">▲</a>

    </main>

    <script src="responsivo.js"></script>
</body>
</html>

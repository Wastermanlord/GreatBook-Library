appId: com.greatbook.library
productName: GreatBook Library
directories:
  output: dist
files:
  - main.js
  - preload.js
  - app/**/*
  - "!app/dsapp/**"
publish:
  provider: github
  owner: Wastermanlord
  repo: GreatBook-Library
  releaseType: release
linux:
  target:
    - AppImage
  icon: app/logo.png
  category: Office
  artifactName: GreatBook-Library-${version}.${ext}
win:
  target:
    - nsis
    - portable
  icon: app/logo.png
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
  artifactName: GreatBook-Library-Setup-${version}.${ext}
portable:
  artifactName: GreatBook-Library-Portable-${version}.${ext}
